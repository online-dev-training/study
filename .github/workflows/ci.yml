name: CI
on: 
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build the package
        run: |
          pip install build
          python -m build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run linters
        run: |
          black --check --line-length=80 --target-version=py33 .
          flake8 .
          mypy --exclude ^build/ .
          pylint --py-version=3.3 *.py
          pylint --disable=R0904,C0114,C0115,C0116 --py-version=3.3 tests/*.py

      - name: Run unit tests + coverage report
        run: |
          coverage run -m unittest discover tests/
          coverage report --show-missing --fail-under=100